name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Check formatting with Ruff
        run: uv run ruff format --check .

      - name: Run tests with coverage
        run: uv run pytest --cov=resume_tailorator --cov-report=term-missing --cov-report=json

      - name: Coverage report
        run: |
          uv run python -c "
          import json, os
          data = json.load(open('coverage.json'))
          totals = data['totals']
          pct = totals['percent_covered']
          emoji = '\U0001f7e2' if pct >= 80 else ('\U0001f7e1' if pct >= 60 else '\U0001f534')
          lines = [f'## {emoji} Coverage: {pct:.1f}%']
          lines.append('')
          lines.append('| | Stmts | Miss | Cover |')
          lines.append('| --- | ---: | ---: | ---: |')
          for path, fdata in sorted(data['files'].items()):
              fp = fdata['summary']
              if fp['num_statements'] == 0:
                  continue
              name = path.replace('resume_tailorator/', '')
              cp = fp['percent_covered']
              lines.append(f'| {name} | {fp[\"num_statements\"]} | {fp[\"missing_lines\"]} | {cp:.0f}% |')
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write('\n'.join(lines))
          "
